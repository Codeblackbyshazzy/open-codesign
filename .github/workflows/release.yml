name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.changeset/**'
      - 'packages/**'
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR
    runs-on: ubuntu-latest
    if: github.repository == 'OpenCoworkAI/open-codesign'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Versioning only. Publishing (npm + GitHub release artifacts) is
      # intentionally NOT wired up yet — packaging needs code-signing
      # (Mac notarization, Windows Authenticode) which we do not have.
      - name: Create Version Pull Request
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
